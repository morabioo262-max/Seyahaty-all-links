<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEYAHATY</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f7fa;
color:#222;
}

/* الصفحة الرئيسية */

.home{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#00b4db,#0083b0);
}

.container{

width:400px;
background:#fff;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);

}

/* تنسيق اللوجو الجديد */
.logo-img {
max-width: 120px; /* يمكنك تعديل المقاس حسب الرغبة */
height: auto;
display: block;
margin: 0 auto 15px auto; /* لتوسيط الصورة وإضافة مسافة أسفلها */
}

.logo{

font-size:50px;
font-weight:bold;
color:#0083b0;
margin-bottom:15px;

}

.container h2{

margin-bottom:15px;
font-size:30px;

}

.container p{

color:#666;
margin-bottom:30px;
font-size:18px;

}

.btn{

display:inline-block;
width:100%;
padding:15px;
background:#0083b0;
color:white;
text-decoration:none;
font-size:20px;
border-radius:30px;
transition:.3s;

}

.btn:hover{

background:#00698d;

}

/* الصفحة الثانية */

.login{

padding:60px 30px;

}

header{

background:#0083b0;
color:white;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
border-radius:15px;
margin-bottom:40px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:25px;

max-width:1000px;

margin:auto;

}

.card{

background:white;

padding:30px;

text-align:center;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

transition:.3s;

cursor:pointer;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.icon{

font-size:60px;

margin-bottom:15px;

}

.name{

font-size:22px;

font-weight:bold;

}

.back{

display:block;

width:250px;

margin:50px auto;

padding:15px;

text-align:center;

background:#0083b0;

color:white;

text-decoration:none;

border-radius:30px;

font-size:20px;

transition:.3s;

}

.back:hover{

background:#00698d;

}

footer{

margin-top:60px;

text-align:center;

color:#777;

padding:20px;

}

</style>

</head>

<body>

<section class="home">

<div class="container">

<!-- مكان اللوجو (استبدل الرابط أدناه بمسار صورتك) -->
<img src="2.PNG" alt="لوجو سياحتي" class="logo-img">

<div class="logo">
SEYAHATY
</div>

<h2>
شركة سياحتي للسفر والسياحة
</h2>

<p>
مرحباً بك في تطبيق سياحتي
</p>

<a href="#login" class="btn">
دخول
</a>

</div>

</section>

<section class="login" id="login">

<header>


</header>

<div class="cards">

<a href="https://reseller.billbed.com/reseller/home/" class="card" target="_blank">

    <div class="icon"></div>
    <div class="name">BILLBED</div>
</a>


<a href="https://new.itrip-online.com/?error=FinalCountdown" class="card" target="_blank">
    <div class="icon"></div>
    <div class="name">itrip</div>
</a>





<a href="https://www.smartbookingsa.com/b2b/login" class="card" target="_blank">
    <div class="icon"></div>
    <div class="name">smartbookingsa</div>
</a>


<a href="https://www.tboholidays.com/NewDefault.aspx?errMessage=Login%20required%20to%20access%20Search%20Hotels%20page.&requestUri=https://www.tboholidays.com/search.aspx?oldVer=true" class="card" target="_blank">
    <div class="icon"></div>
    <div class="name">tpo</div>
</a>

<a href="https://b2b.beta-travel.net/NewSearch/Hotel" class="card" target="_blank">
    <div class="icon"></div>
    <div class="name">beta</div>
</a>

</div>

<a href="#" class="back">
الرجوع للرئيسية
</a>

<footer>

© Eng MR  - جميع الحقوق محفوظة

</footer>

</section>

</body>
</html>
